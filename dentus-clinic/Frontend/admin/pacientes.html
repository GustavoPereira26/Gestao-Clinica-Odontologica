<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gerenciamento de pacientes da Dentus Clinic — consulte, filtre e gerencie os pacientes cadastrados." />
    <title>Dentus Clinic  — pacientes</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../root.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/admin/pacientes.css" />
</head>

<body>

    <!-- ═══ LAYOUT ═══ -->
    <div class="app-layout">

        <!-- Botão Hamburger (mobile) -->
        <button class="btn-hamburger" id="btnHamburger" aria-label="Abrir menu">
            <i class="bi bi-list"></i>
        </button>

        <!-- Sidebar (renderizada via JS) -->
        <div id="sidebarContainer"></div>

        <!-- ═══ CONTEÚDO PRINCIPAL ═══ -->
        <main class="app-content" id="mainContent">

            <!-- Header da página -->
            <header class="page-header" id="pageHeader">
                <div class="page-header-left">
                    <h1 class="page-title">
                        <i class="bi bi-people-fill page-title-icon"></i>
                        Pacientes
                    </h1>
                    <p class="page-subtitle">Consulte e gerencie os pacientes cadastrados</p>
                </div>
                <div class="page-header-right">
                    <span class="badge-total" id="badgeTotal">0 pacientes</span>
                </div>
            </header>

            <!-- ═══ BARRA DE FILTROS ═══ -->
            <section class="filter-bar" id="filterBar">
                <div class="filter-field" id="filterFieldNome">
                    <label class="filter-label" for="filtroNome">Paciente</label>
                    <div class="filter-input-wrapper">
                        <i class="bi bi-search filter-input-icon"></i>
                        <input
                            type="text"
                            class="filter-input"
                            id="filtroNome"
                            placeholder="Buscar por nome..."
                            autocomplete="off"
                        />
                    </div>
                </div>

                <div class="filter-field" id="filterFieldCPF">
                    <label class="filter-label" for="filtroCPF">CPF</label>
                    <div class="filter-input-wrapper">
                        <i class="bi bi-credit-card filter-input-icon"></i>
                        <input
                            type="text"
                            class="filter-input"
                            id="filtroCPF"
                            placeholder="000.000.000-00"
                            maxlength="14"
                            autocomplete="off"
                        />
                    </div>
                </div>

                <div class="filter-field" id="filterFieldData">
                    <label class="filter-label" for="filtroData">Data Cadastro</label>
                    <div class="filter-input-wrapper">
                        <input
                            type="date"
                            class="filter-input filter-input-date"
                            id="filtroData"
                        />
                    </div>
                </div>

                <div class="filter-actions" id="filterActions">
                    <button class="btn-filter-clear" id="btnLimparFiltros" title="Limpar filtros">
                        <i class="bi bi-x-lg"></i>
                        Limpar
                    </button>
                </div>
            </section>

            <!-- ═══ TABELA (Desktop / Tablet) ═══ -->
            <section class="table-container" id="tableContainer">
                <div class="table-scroll">
                    <table class="table-pacientes" id="tablePacientes">
                        <thead>
                            <tr>
                                <th class="th-nome">
                                    <button class="th-sort" data-col="nome" id="sortNome">
                                        Nome do paciente <i class="bi bi-chevron-expand"></i>
                                    </button>
                                </th>
                                <th class="th-cpf">CPF</th>
                                <th class="th-celular">Celular</th>
                                <th class="th-data">
                                    <button class="th-sort" data-col="data" id="sortData">
                                        Data Cadastro <i class="bi bi-chevron-expand"></i>
                                    </button>
                                </th>
                                <th class="th-acoes">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyPacientes">
                            <!-- Renderizado via JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Estado vazio -->
                <div class="empty-state hidden" id="emptyState">
                    <i class="bi bi-person-x"></i>
                    <p>Nenhum paciente encontrado</p>
                </div>
            </section>

            <!-- ═══ LISTA CARDS (Mobile) ═══ -->
            <section class="cards-mobile hidden" id="cardsMobile">
                <!-- Renderizado via JS -->
            </section>

        </main>
    </div>

    <!-- ═══ MODAL DE CONFIRMAÇÃO (Bootstrap) ═══ -->
    <div class="modal fade" id="modalDeletarPaciente" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <!-- Como no wireframe, o título ali em cima tá escrito "Restaurar Senha", vou colocar "Deletar Paciente" mas com o botão fechar -->
                <div class="modal-header border-0 pb-0 pt-3 pe-3 justify-content-between align-items-center">
                    <h5 class="modal-title fs-6 ms-2">Deletar Paciente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex flex-column align-items-center text-center mt-2 px-4 pb-4">
                    <div class="d-flex align-items-center gap-3 w-100 mb-4 justify-content-center">
                        <div class="p-3 border rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width: 50px; height: 50px;">
                            <i class="bi bi-trash fs-3 text-dark"></i>
                        </div>
                        <div class="text-start">
                            <h6 class="fw-semibold mb-1" style="font-size: 1rem;">Tem certeza que deseja deletar Paciente?</h6>
                            <small class="text-muted" style="font-size: 0.85rem;">Essa ação não pode ser revertida</small>
                        </div>
                    </div>

                    <div class="text-center" style="font-size: 0.9rem; line-height: 1.6;">
                        <div>Nome: <span id="mdlNome"></span></div>
                        <div>CPF: <span id="mdlCPF"></span></div>
                        <div>Celular: <span id="mdlCelular"></span></div>
                        <div>Data Cadastral: <span id="mdlData"></span></div>
                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-4 w-100">
                        <button type="button" class="btn btn-outline-secondary px-4 text-dark bg-white border-dark" data-bs-dismiss="modal" style="border-radius: 8px;">Cancelar</button>
                        <button type="button" class="btn btn-danger px-4 d-flex align-items-center gap-2" id="modalBtnConfirmarExclusao" onclick="PacientesPage.efetivarExclusao()" style="border-radius: 8px; background-color: #d9534f; border-color: #d9534f;">
                            <i class="bi bi-trash"></i> DELETAR
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Componentes -->
    <script src="../components/sidebar.js"></script>
    <!-- JS da página -->
    <script src="../js/admin/pacientes.js"></script>
</body>
</html>
