<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dentu's Clinic — Consultas</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Estilos globais (iguais em toda tela) -->
  <link rel="stylesheet" href="../root.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <!-- Estilo específico desta tela -->
  <link rel="stylesheet" href="../css/recepcionista/consultas.css"/>
</head>
<body>

  <!-- Botão hamburguer (mobile) -->
  <button class="btn-hamburger" id="btnHamburger" aria-label="Abrir menu">
    <i class="fa-solid fa-bars"></i>
  </button>

  <div class="app-layout">

    <!-- Sidebar (renderizada pelo componente) -->
    <div id="sidebarContainer"></div>

    <!-- Conteúdo principal -->
    <main class="app-content">

      <!-- Header -->
      <header class="page-header">
        <div class="page-header-left">
          <h1 class="page-title">
            <i class="fa-solid fa-calendar-check page-title-icon"></i>
            Consultas
          </h1>
          <p class="page-subtitle">Gerencie e acompanhe todas as consultas agendadas</p>
        </div>
        <div class="page-header-right">
          <span class="badge-total" id="badgeTotal">22 consultas</span>
        </div>
      </header>

      <!-- Barra de filtros -->
      <div class="filter-bar" role="search" aria-label="Filtrar consultas">

        <!-- Paciente -->
        <div class="filter-field">
          <label class="filter-label" for="fPaciente">Paciente</label>
          <div class="filter-input-wrapper">
            <i class="fa-solid fa-user filter-input-icon"></i>
            <input
              type="text"
              id="fPaciente"
              class="filter-input"
              placeholder="Nome do paciente"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Data -->
        <div class="filter-field">
          <label class="filter-label" for="fData">Data</label>
          <div class="filter-input-wrapper">
            <input
              type="date"
              id="fData"
              class="filter-input filter-input-date"
            />
          </div>
        </div>

        <!-- Hora -->
        <div class="filter-field" style="max-width: 120px;">
          <label class="filter-label" for="fHora">Hora</label>
          <div class="filter-input-wrapper">
            <i class="fa-solid fa-clock filter-input-icon"></i>
            <input
              type="text"
              id="fHora"
              class="filter-input"
              placeholder="08:00"
              maxlength="5"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Doutor(a) -->
        <div class="filter-field">
          <label class="filter-label" for="fDoutor">Doutor(a)</label>
          <div class="filter-input-wrapper">
            <i class="fa-solid fa-id-card filter-input-icon"></i>
            <input
              type="text"
              id="fDoutor"
              class="filter-input"
              placeholder="Nome do doutor"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Serviço Odontológico -->
        <div class="filter-field">
          <label class="filter-label" for="fServico">Serviço Odontológico</label>
          <div class="filter-input-wrapper">
            <i class="fa-solid fa-notes-medical filter-input-icon"></i>
            <input
              type="text"
              id="fServico"
              class="filter-input"
              placeholder="Ex: Limpeza"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Limpar filtros -->
        <div class="filter-actions">
          <button class="btn-filter-clear" id="btnLimparFiltros" type="button">
            <i class="fa-solid fa-circle-xmark"></i> Limpar
          </button>
        </div>

      </div>
      <!-- /filter-bar -->

      <!-- Tabela (desktop / tablet) -->
      <div class="table-container" id="tableContainer">
        <div class="table-scroll">
          <table class="table-consultas" aria-label="Lista de consultas">
            <thead>
              <tr>
                <th class="th-nome">Nome do paciente</th>
                <th class="th-data">Data</th>
                <th class="th-hora">Hora</th>
                <th class="th-doutor">Doutor responsável</th>
                <th class="th-servico">Serviço Odontológico</th>
                <th class="th-acoes">Ações</th>
              </tr>
            </thead>
            <tbody id="tbodyConsultas">
              <!-- Preenchido pelo JS -->
            </tbody>
          </table>

          <!-- Estado vazio -->
          <div class="empty-state hidden" id="emptyState">
            <i class="fa-solid fa-calendar-xmark"></i>
            <p>Nenhuma consulta encontrada</p>
          </div>
        </div>
      </div>

      <!-- Cards (mobile) -->
      <div class="cards-mobile" id="cardsMobile" aria-label="Lista de consultas (mobile)">
        <!-- Preenchido pelo JS -->
      </div>

      <!-- Botão Agendar Consulta -->
      <div class="btn-agendar-wrapper">
        <button class="btn-agendar" id="btnAgendar" type="button">
          <i class="fa-solid fa-calendar-plus"></i>
          Agendar Consulta
        </button>
      </div>

    </main>
  </div>

  <!-- Modal de confirmação de exclusão -->
  <div class="modal-overlay hidden" id="modalConfirmacao" role="dialog" aria-modal="true" aria-labelledby="modalTitulo">
    <div class="modal-box">
      <div class="modal-icon">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <h2 class="modal-title" id="modalTitulo">Excluir consulta?</h2>
      <p class="modal-text">
        Tem certeza que deseja excluir a consulta de
        <strong id="modalNomePaciente"></strong>?
        Esta ação não pode ser desfeita.
      </p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="btnModalCancelar" type="button">Cancelar</button>
        <button class="modal-btn modal-btn-confirm" id="btnModalConfirmar" type="button">Excluir</button>
      </div>
    </div>
  </div>

  <!-- Scripts Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Scripts do projeto (ordem obrigatória) -->
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../components/sidebar.js"></script>
  <!-- Script desta tela (sempre por último) -->
  <script src="../js/recepcionista/consultas.js"></script>

</body>
</html>
