<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gerenciamento de pacientes da Dentus Clinic — consulte, filtre e gerencie os pacientes cadastrados." />
    <title>Dentus Clinic  — pacientes</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../root.css" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/admin/pacientes.css" />
</head>

<body>

<!-- ═══ LAYOUT ═══ -->
<div class="app-layout">

    <!-- Botão Hamburger (mobile) -->
    <button class="btn-hamburger" id="btnHamburger" aria-label="Abrir menu">
        <i class="bi bi-list"></i>
    </button>

    <!-- Sidebar (renderizada via JS) -->
    <div id="sidebarContainer"></div>

    <!-- ═══ CONTEÚDO PRINCIPAL ═══ -->
    <main class="app-content" id="mainContent">

        <!-- Header da página -->
        <header class="page-header" id="pageHeader">
            <div class="page-header-left">
                <h1 class="page-title">
                    <i class="bi bi-people-fill page-title-icon"></i>
                    Pacientes
                </h1>
                <p class="page-subtitle">Consulte e gerencie os pacientes cadastrados</p>
            </div>
            <div class="page-header-right">
                <span class="badge-total" id="badgeTotal">0 pacientes</span>
            </div>
        </header>

        <!-- ═══ BARRA DE FILTROS ═══ -->
        <section class="filter-bar" id="filterBar">
            <div class="filter-field" id="filterFieldNome">
                <label class="filter-label" for="filtroNome">Paciente</label>
                <div class="filter-input-wrapper">
                    <i class="bi bi-search filter-input-icon"></i>
                    <input
                            type="text"
                            class="filter-input"
                            id="filtroNome"
                            placeholder="Buscar por nome..."
                            autocomplete="off"
                    />
                </div>
            </div>

            <div class="filter-field" id="filterFieldCPF">
                <label class="filter-label" for="filtroCPF">CPF</label>
                <div class="filter-input-wrapper">
                    <i class="bi bi-credit-card filter-input-icon"></i>
                    <input
                            type="text"
                            class="filter-input"
                            id="filtroCPF"
                            placeholder="000.000.000-00"
                            maxlength="14"
                            autocomplete="off"
                    />
                </div>
            </div>

            <div class="filter-field" id="filterFieldData">
                <label class="filter-label" for="filtroData">Data Cadastro</label>
                <div class="filter-input-wrapper">
                    <input
                            type="date"
                            class="filter-input filter-input-date"
                            id="filtroData"
                    />
                </div>
            </div>

            <div class="filter-actions" id="filterActions">
                <button class="btn-filter-clear" id="btnLimparFiltros" title="Limpar filtros">
                    <i class="bi bi-x-lg"></i>
                    Limpar
                </button>
            </div>
        </section>

        <!-- ═══ TABELA (Desktop / Tablet) ═══ -->
        <section class="table-container" id="tableContainer">
            <div class="table-scroll">
                <table class="table-pacientes" id="tablePacientes">
                    <thead>
                    <tr>
                        <th class="th-nome">
                            <button class="th-sort" data-col="nome" id="sortNome">
                                Nome do paciente <i class="bi bi-chevron-expand"></i>
                            </button>
                        </th>
                        <th class="th-cpf">CPF</th>
                        <th class="th-celular">Celular</th>
                        <th class="th-data">
                            <button class="th-sort" data-col="data" id="sortData">
                                Data Cadastro <i class="bi bi-chevron-expand"></i>
                            </button>
                        </th>
                        <th class="th-acoes">Ações</th>
                    </tr>
                    </thead>
                    <tbody id="tbodyPacientes">
                    <!-- Renderizado via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Estado vazio -->
            <div class="empty-state hidden" id="emptyState">
                <i class="bi bi-person-x"></i>
                <p>Nenhum paciente encontrado</p>
            </div>
        </section>

        <!-- ═══ LISTA CARDS (Mobile) ═══ -->
        <section class="cards-mobile hidden" id="cardsMobile">
            <!-- Renderizado via JS -->
        </section>

    </main>
</div>

<!-- ═══ MODAL DE CONFIRMAÇÃO (delete mock) ═══ -->
<div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox">
        <div class="modal-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        <h3 class="modal-title">Excluir paciente?</h3>
        <p class="modal-text" id="modalText">Deseja realmente remover este paciente?</p>
        <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="modalBtnCancelar">Cancelar</button>
            <button class="modal-btn modal-btn-confirm" id="modalBtnConfirmar">
                <i class="bi bi-trash3 me-1"></i> Excluir
            </button>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Componentes -->
<script src="../components/sidebar.js"></script>
<!-- JS da página -->
<script src="../js/admin/pacientes.js"></script>
</body>
</html>
